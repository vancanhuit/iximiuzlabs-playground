##### ~/.tmux.conf
##### Debian WSL2, tmux 3.5a
##### No plugins, no clip.exe, no external clipboard integration


##### Prefix

set -g prefix C-a
unbind C-b
bind C-a send-prefix


##### Server / terminal behavior

set -s default-terminal 'tmux-256color'
set -as terminal-features ",xterm-256color:RGB"

# Good defaults for modern terminals and editors.
set -g focus-events on
set -g escape-time 10

# Allow tmux itself to set the external terminal clipboard,
# while ignoring clipboard writes from applications inside tmux.
set -s set-clipboard external


##### Indexing / windows / panes

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep lots of scrollback.
set -g history-limit 100000

# Update outside terminal title.
set -g set-titles on

# Keep tmux server useful when sessions are closed.
set -g detach-on-destroy off


##### Reload config

bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"


##### Mouse

set -g mouse on

# The wiki notes that mouse drag normally copies and exits copy mode.
# This changes mouse drag release so it does not automatically copy/exit.
# Use keyboard copy bindings instead.
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane


##### Vi-style copy mode and command prompt

set -g mode-keys vi
set -g status-keys vi

bind [ copy-mode

# Vi-like copy mode bindings.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X clear-selection
bind -T copy-mode-vi q send -X cancel

# Useful line navigation.
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Search in copy mode.
bind -T copy-mode-vi / command-prompt -p "search down:" "send -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "search up:" "send -X search-backward '%%'"
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi N send -X search-reverse

# Prefix + ] remains the default paste-from-buffer binding.
# Prefix + y just shows a preview of the latest tmux buffer.
bind y display-message "Latest tmux buffer: #{buffer_sample}"


##### Pane and window creation

# Open new windows/panes in the current pane's working directory.
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Easier split bindings.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


##### Pane navigation and resizing

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind z resize-pane -Z
bind Space next-layout


##### Window navigation and ordering

bind -r C-h previous-window
bind -r C-l next-window

bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1


##### Safer destructive commands

bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window


##### Find / choose helpers

# Session picker.
bind s choose-tree -sZ

# Window picker.
bind w choose-tree -wZ

# Find panes/windows by visible text, title, or window name.
# This mirrors the wiki's description of the default find-window behavior.
bind f command-prompt -p "find:" "find-window '%%'"

# Command prompt.
bind : command-prompt


##### Status bar

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

set -g status-style 'bg=default,fg=colour245'
set -g status-left-length 80
set -g status-right-length 120

# Prefix indicator + session name.
set -g status-left '#{?client_prefix,#[fg=colour16 bg=colour214 bold] PREFIX #[default] ,}#[fg=colour214,bold] #S #[default]'

# Date/time without shelling out; tmux expands these itself.
set -g status-right '#[fg=colour245]%Y-%m-%d #[fg=colour214]%H:%M #[default]'

setw -g window-status-format ' #[fg=colour245]#I:#W '
setw -g window-status-current-format ' #[fg=colour214,bold]#I:#W#{?window_zoomed_flag,*,} '
setw -g window-status-separator ''

set -g message-style 'bg=colour236,fg=colour231'
set -g mode-style 'bg=colour214,fg=colour16'


##### Pane border styling

set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour214'

# Optional pane title in border.
# Uncomment these if you like visible pane titles.
# set -g pane-border-status top
# set -g pane-border-format '#[bold]#{pane_title}#[default]'


##### Quality of life

# Clear pane screen and tmux scrollback.
bind C-l send-keys C-l \; clear-history

# Rename window/session.
bind , command-prompt -I "#W" "rename-window '%%'"
bind '$' command-prompt -I "#S" "rename-session '%%'"

# Create and switch to a new session from inside tmux.
bind N command-prompt -p "new session name:" "new-session -d -s '%%' \; switch-client -t '%%'"

# Toggle synchronize-panes with a visible warning.
bind S setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"
